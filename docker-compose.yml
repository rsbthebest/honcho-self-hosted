version: "3.9"

networks:
  dokploy:
    external: true

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Optional: keep if you want IP:8000 access
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://honcho:honcho@database:5432/honcho
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - DB_POOL_TIMEOUT=5
    volumes:
      - ./docker/entrypoint.sh:/app/docker/entrypoint.sh:ro
    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.honcho.rule=Host(`memory.services.agonmmers.com`)"
      - "traefik.http.routers.honcho.entrypoints=websecure"
      - "traefik.http.routers.honcho.tls.certresolver=letsencrypt"
      - "traefik.http.services.honcho.loadbalancer.server.port=8000"

    networks:
      - dokploy

  deriver:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://honcho:honcho@database:5432/honcho
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - METRICS_ENABLED=false
      - DB_POOL_TIMEOUT=5
    restart: unless-stopped

    networks:
      - dokploy

  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=honcho
      - POSTGRES_USER=honcho
      - POSTGRES_PASSWORD=honcho
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honcho -d honcho"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - dokploy

  redis:
    image: redis:8.2
    restart: unless-stopped
    # No ports exposed — internal only
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - dokploy

volumes:
  pgdata:
  redis-data:
